<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: #fff;
    }
    .header {
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo-container {
      display: flex;
      align-items: center;
    }
    .logo-svg {
      width: 40px;
      height: 40px;
      margin-right: 12px;
    }
    .logo-text {
      font-size: 24px;
      font-weight: bold;
      color: #fff;
    }
    .main-content {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }
    .error-container {
      background: #1e1e1e;
      border-radius: 16px;
      padding: 60px 40px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
      text-align: center;
    }
    .error-container h1 {
      font-size: 72px;
      margin-bottom: 20px;
      color: #ff6b6b;
      font-weight: bold;
    }
    .error-container h2 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #fff;
    }
    .error-container p {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .error-container a {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 30px;
      background: #3663FF;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .footer {
      background: #1e1e1e;
      border-top: 1px solid #333;
      padding: 20px;
      text-align: center;
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <img src="https://sharer.jbjb.r-e.kr/logo.svg" class="logo-svg">
      <span class="logo-text">Sharer</span>
    </div>
  </div>
  <div class="main-content">
    <div class="error-container">
      <h1>진정해</h1>
      <h2>진짜 못생겼어</h2>
      <p>ㅅㅂㅅㅂㅅㅂ<br>에휴 ㅉㅉ</p>
      <a href="https://sharer.jbjb.r-e.kr/index.html">확인</a>
    </div>
  </div>
  <div class="footer">
    © 2025 ㋡꧁정빈777꧂ SNS. All rights reserved.
  </div>
</body>
</html>
